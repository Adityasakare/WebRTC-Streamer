<!DOCTYPE html>
<html>
<head>
    <title>CCTV Viewer</title>
        <!-- hls.js MUST be before script.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h2>CCTV Viewer</h2>

    <div id="login">
        <input id="username" type="text" placeholder="Your name" />
        <button id="btnConnect">Connect</button>
    </div>

    <div id="cameras" style="display:none">
        <h3>Available Cameras</h3>
        <div id="cameraList"></div>
    </div>

    <div id="streams"></div>

    <div id="playbackPanel" style="display:none; margin-top:20px; padding:16px;
     border:1px solid #444; border-radius:6px; background:#1a1a1a; color:#eee;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <strong>Playback — <span id="playbackDevice"></span></strong>
        <button onclick="closePlayback()">✕ Close</button>
    </div>
    <div style="display:flex; gap:10px; align-items:center; margin-bottom:10px; flex-wrap:wrap;">
        <label>Date: <input type="date" id="playbackDate"/></label>
        <label>Time: <input type="time" id="playbackTime" value="00:00"/></label>
        <button onclick="startPlayback()">▶ Play</button>
    </div>
    <div id="playbackStatus" style="font-size:12px; color:#aaa; margin-bottom:10px;"></div>
    <video id="playbackVideo" controls width="640" height="480"
           style="background:#000; display:block; border-radius:4px;"></video>
</div>

    <div id="status"></div>
<script src="script.js"></script>



</body>
</html>
